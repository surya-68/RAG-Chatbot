version: "3.8"

services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  app:
    build: .
    container_name: rag_app
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    restart: always

volumes:
  ollama_data:
